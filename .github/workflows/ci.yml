name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - name: Enable Corepack pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@9.15.1 --activate
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm -w build
      - name: Typecheck
        run: pnpm -w typecheck
      - name: Lint
        run: pnpm -w lint
      - name: Unit tests
        run: pnpm -w test:unit
      - name: Install Playwright browser
        run: pnpm exec playwright install chromium
      - name: Full E2E
        run: pnpm -w test:e2e:full
      - name: Generate E2E Matrix
        env:
          BAK_ENFORCE_E2E_COVERAGE: "1"
        run: pnpm -w e2e:matrix
      - name: Generate Release Capability Report
        run: pnpm -w release:report
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-e2e-artifacts-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            test-results
            docs/E2E_MATRIX.md
            docs/CAPABILITY_MATRIX.md
            docs/RELEASE_CAPABILITY_REPORT.md
