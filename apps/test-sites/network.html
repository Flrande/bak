<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAK Test - Network</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 20px;
        color: #0f172a;
        background: linear-gradient(160deg, #ecfccb, #f0fdf4);
      }
      .panel {
        max-width: 760px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        padding: 18px;
        background: white;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }
      button {
        border: none;
        border-radius: 6px;
        padding: 8px 12px;
        color: white;
        background: #15803d;
        cursor: pointer;
      }
      #network-log {
        margin-top: 14px;
        font-size: 13px;
        color: #334155;
      }
    </style>
  </head>
  <body data-page="network">
    <div class="panel">
      <a href="/">Back</a>
      <h1>Network Playground</h1>
      <div class="actions">
        <button id="fetch-ok">Fetch 200</button>
        <button id="fetch-fail">Fetch 503</button>
      </div>
      <div id="network-log">idle</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
