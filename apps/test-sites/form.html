<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAK Test - Form</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 20px;
        color: #0f172a;
        background: linear-gradient(160deg, #fff7ed, #fefce8);
      }
      .panel {
        max-width: 760px;
        border-radius: 12px;
        border: 1px solid #cbd5e1;
        padding: 18px;
        background: white;
      }
      .field {
        margin-top: 10px;
      }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #94a3b8;
        border-radius: 6px;
        padding: 8px;
      }
      button {
        margin-top: 12px;
        border: none;
        border-radius: 6px;
        padding: 10px 14px;
        cursor: pointer;
      }
      #save-btn { background: #ea580c; color: white; }
      #cancel-btn { background: #e2e8f0; }
      #result { margin-top: 14px; font-weight: 600; }
    </style>
  </head>
  <body data-page="form">
    <div class="panel">
      <a href="/">Back</a>
      <h1>Form Playground</h1>
      <div class="field">
        <label for="name-input">Name</label>
        <input id="name-input" name="name" placeholder="请输入姓名" />
      </div>
      <div class="field">
        <label for="email-input">Email</label>
        <input id="email-input" name="email" placeholder="name@example.com" />
      </div>
      <div class="field">
        <label for="note-input">Note</label>
        <textarea id="note-input" name="note" rows="3" placeholder="填写备注"></textarea>
      </div>
      <button id="save-btn">提交保存</button>
      <button id="cancel-btn">重置</button>
      <div id="result">Waiting...</div>
      <a id="next-page" href="/table.html">Go table page</a>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
