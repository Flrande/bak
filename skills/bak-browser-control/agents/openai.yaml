interface:
  display_name: "Browser Agent Kit"
  short_description: "Drive Chromium through bak sessions, dynamic data helpers, and runtime-aware setup"
  default_prompt: "Use $bak-browser-control for browser work in this repo. Stay on Windows + PowerShell 7, run `bak doctor` first because it auto-starts the local runtime when needed, use `bak status` or `bak stop` for runtime inspection and clean restarts, reserve `bak serve` for advanced debugging only, create a session, use `bak session open-tab --active` when later page commands should target the new tab, prefer `bak inspect page-data` then `bak page extract --resolver auto|lexical`, network tools, table helpers, and freshness/live-updates for dynamic sites, require explicit authorization plus `--requires-confirm` for mutating page fetch or replay calls, and stop for manual unpacked-extension reload when doctor still shows version drift after an upgrade."
