interface:
  display_name: "Browser Agent Kit"
  short_description: "Drive Chromium through bak sessions, dynamic data helpers, and runtime-aware setup"
  default_prompt: "Use $bak-browser-control for browser work in this repo. Stay on Windows + PowerShell 7, run `bak doctor` first because it auto-starts the local runtime when needed, use `bak doctor --fix` for safe local runtime repairs, use `bak status` or `bak stop` for runtime inspection and clean restarts, reserve `bak serve` for advanced debugging only, create or resolve a session, use `bak session dashboard` when session ownership or context depth is unclear, treat session-owned tabs as living in the current browser window while each session owns its own tab group, use `bak session open-tab --active` when later page commands should target the new tab, prefer `bak page snapshot --annotate` or `bak debug dump-state --include-snapshot --annotate-snapshot` for verification, use `--diff-with` for structured before/after interaction diffs, prefer `bak inspect page-data` then `bak page extract --resolver auto|lexical`, network tools, and table helpers with `intelligence` or `extraction` metadata for dynamic sites, use `bak policy preview` before risky actions and `bak policy audit` or `bak policy recommend` when explaining or refining policy behavior, require explicit authorization plus `--requires-confirm` for mutating page fetch or replay calls, and stop for manual unpacked-extension reload when doctor still shows version drift after an upgrade."
